schemaVersion: v0.2
prepare:
  steps:
    - name: Install Dependencies
      command: npm install
    - name: Build Application
      command: npm run build
test:
  steps: []
run:
  app:
    steps:
      - name: Serve Static Files
        command: npx serve dist -l 3000
    plan: 8
    replicas: 1
    isPublic: true
    network:
      path: /
      stripPath: false
